[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "nodejs_20", "tesseract"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "python3 -m gunicorn --bind=0.0.0.0:$PORT --workers=1 --timeout=180 --preload app:app"
